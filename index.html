<!doctype html>
<html lang="zh-HK">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gemma 4 E2B 本地網頁推理 (PoC)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              brand: { DEFAULT: "#4f46e5", light: "#818cf8", dark: "#3730a3" },
            },
          },
        },
      };
    </script>
  </head>
  <body class="bg-slate-100 min-h-screen flex flex-col items-center py-8 px-4">
    <!-- Header -->
    <div class="w-full max-w-3xl mb-4">
      <h1 class="text-2xl font-bold text-slate-800 text-center">
        🧠 學校專用 AI Assistant
      </h1>
      <p class="text-center text-slate-500 text-sm mt-1">
        Local-First · 所有運算在瀏覽器本地進行
      </p>
    </div>

    <!-- Status bar -->
    <div
      id="status-bar"
      class="w-full max-w-3xl mb-4 flex items-center gap-3 bg-white rounded-xl px-4 py-3 shadow-sm border border-slate-200"
    >
      <span
        id="status-dot"
        class="inline-block w-3 h-3 rounded-full bg-yellow-400 flex-shrink-0"
      ></span>
      <span id="status-text" class="text-sm text-slate-600"
        >準備中：正在註冊 Service Worker...</span
      >
      <span
        id="cache-badge"
        class="ml-auto hidden text-xs font-medium px-2 py-0.5 rounded-full"
      ></span>
    </div>

    <div class="w-full max-w-3xl flex gap-4">
      <!-- Left: Chat + Input -->
      <div class="flex-1 flex flex-col gap-3">
        <!-- Chat box -->
        <div
          id="chat-box"
          class="bg-white rounded-xl shadow-sm border border-slate-200 h-96 overflow-y-auto p-4 flex flex-col gap-3"
        ></div>

        <!-- Token/s indicator -->
        <div id="tps-bar" class="hidden text-xs text-slate-400 text-right pr-1">
          ⚡ <span id="tps-value">—</span> tokens/s
        </div>

        <!-- Multiline input -->
        <div
          class="bg-white rounded-xl shadow-sm border border-slate-200 flex flex-col"
        >
          <textarea
            id="prompt"
            rows="3"
            placeholder="輸入問題… (Shift+Enter 換行，Enter 發送)"
            disabled
            class="w-full resize-none rounded-t-xl px-4 py-3 text-sm text-slate-800 placeholder-slate-400 focus:outline-none disabled:bg-slate-50 disabled:cursor-not-allowed"
          ></textarea>
          <div class="flex justify-end px-3 pb-3 pt-1">
            <button
              id="send-btn"
              disabled
              class="px-5 py-2 bg-brand text-white text-sm font-medium rounded-lg hover:bg-brand-dark disabled:bg-slate-300 disabled:cursor-not-allowed transition-colors"
            >
              發送
            </button>
          </div>
        </div>
      </div>

      <!-- Right: Settings panel -->
      <div class="w-64 flex-shrink-0 flex flex-col gap-3">
        <!-- Model cache status card -->
        <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-4">
          <h2
            class="text-xs font-semibold text-slate-500 uppercase tracking-wide mb-3"
          >
            模型快取狀態
          </h2>
          <div id="cache-status-detail" class="text-sm text-slate-500 italic">
            檢查中...
          </div>
        </div>

        <!-- Parameters card -->
        <div
          class="bg-white rounded-xl shadow-sm border border-slate-200 p-4 flex flex-col gap-4"
        >
          <h2
            class="text-xs font-semibold text-slate-500 uppercase tracking-wide"
          >
            推理參數
          </h2>

          <!-- Max Tokens -->
          <div>
            <div class="flex justify-between items-center mb-1">
              <label
                class="text-xs font-medium text-slate-700 flex items-center gap-1"
              >
                Max Tokens
                <span
                  class="cursor-help text-slate-400"
                  title="模型單次回覆最多可生成的 token 數量。數值越大，回覆可以越長，但速度也越慢。"
                  >ⓘ</span
                >
              </label>
              <span id="maxTokens-val" class="text-xs text-brand font-mono"
                >1024</span
              >
            </div>
            <input
              type="range"
              id="maxTokens"
              min="64"
              max="4096"
              step="64"
              value="1024"
              class="w-full accent-brand"
            />
            <div class="flex justify-between text-[10px] text-slate-400 mt-0.5">
              <span>64</span><span>4096</span>
            </div>
          </div>

          <!-- Top-K -->
          <div>
            <div class="flex justify-between items-center mb-1">
              <label
                class="text-xs font-medium text-slate-700 flex items-center gap-1"
              >
                Top-K
                <span
                  class="cursor-help text-slate-400"
                  title="每步只從機率最高的 K 個 token 中取樣。K 越小，回覆越保守集中；K 越大，回覆越多樣。"
                  >ⓘ</span
                >
              </label>
              <span id="topK-val" class="text-xs text-brand font-mono">40</span>
            </div>
            <input
              type="range"
              id="topK"
              min="1"
              max="100"
              step="1"
              value="40"
              class="w-full accent-brand"
            />
            <div class="flex justify-between text-[10px] text-slate-400 mt-0.5">
              <span>1</span><span>100</span>
            </div>
          </div>

          <!-- Top-P -->
          <div>
            <div class="flex justify-between items-center mb-1">
              <label
                class="text-xs font-medium text-slate-700 flex items-center gap-1"
              >
                Top-P
                <span
                  class="cursor-help text-slate-400"
                  title="Nucleus Sampling：只從累積機率達到 P 的最小 token 集合中取樣。P=1 表示不限制；P=0.9 表示只考慮最可能的 90% token。"
                  >ⓘ</span
                >
              </label>
              <span id="topP-val" class="text-xs text-brand font-mono"
                >0.95</span
              >
            </div>
            <input
              type="range"
              id="topP"
              min="0.1"
              max="1.0"
              step="0.05"
              value="0.95"
              class="w-full accent-brand"
            />
            <div class="flex justify-between text-[10px] text-slate-400 mt-0.5">
              <span>0.1</span><span>1.0</span>
            </div>
          </div>

          <!-- Temperature -->
          <div>
            <div class="flex justify-between items-center mb-1">
              <label
                class="text-xs font-medium text-slate-700 flex items-center gap-1"
              >
                Temperature
                <span
                  class="cursor-help text-slate-400"
                  title="控制回覆的「創意度」。接近 0 時回覆非常確定、重複；接近 2 時回覆更隨機、富創意。一般建議 0.7–1.0。"
                  >ⓘ</span
                >
              </label>
              <span id="temperature-val" class="text-xs text-brand font-mono"
                >0.8</span
              >
            </div>
            <input
              type="range"
              id="temperature"
              min="0.0"
              max="2.0"
              step="0.05"
              value="0.8"
              class="w-full accent-brand"
            />
            <div class="flex justify-between text-[10px] text-slate-400 mt-0.5">
              <span>0</span><span>2</span>
            </div>
          </div>

          <!-- Thinking budget -->
          <div>
            <div class="flex justify-between items-center mb-1">
              <label
                class="text-xs font-medium text-slate-700 flex items-center gap-1"
              >
                Thinking Budget
                <span
                  class="cursor-help text-slate-400"
                  title="Gemma 4 的「思考」token 預算。模型在正式回覆前會先進行內部推理，數值越大思考越深入，但耗時更長。設為 0 可停用思考。"
                  >ⓘ</span
                >
              </label>
              <span id="thinking-val" class="text-xs text-brand font-mono"
                >0</span
              >
            </div>
            <input
              type="range"
              id="thinking"
              min="0"
              max="2048"
              step="64"
              value="0"
              class="w-full accent-brand"
            />
            <div class="flex justify-between text-[10px] text-slate-400 mt-0.5">
              <span>停用</span><span>2048</span>
            </div>
          </div>

          <!-- Reload model button -->
          <button
            id="reload-btn"
            class="w-full mt-1 py-2 text-xs font-medium text-white bg-brand rounded-lg hover:bg-brand-dark disabled:bg-slate-300 disabled:cursor-not-allowed transition-colors"
            disabled
          >
            套用並重新載入模型
          </button>
        </div>
      </div>
    </div>

    <script type="module">
      import {
        FilesetResolver,
        LlmInference,
      } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-genai";

      // ── DOM refs ──────────────────────────────────────────────────────────
      const statusDot = document.getElementById("status-dot");
      const statusText = document.getElementById("status-text");
      const cacheBadge = document.getElementById("cache-badge");
      const cacheDetail = document.getElementById("cache-status-detail");
      const chatBox = document.getElementById("chat-box");
      const promptInput = document.getElementById("prompt");
      const sendBtn = document.getElementById("send-btn");
      const tpsBar = document.getElementById("tps-bar");
      const tpsValue = document.getElementById("tps-value");
      const reloadBtn = document.getElementById("reload-btn");

      const sliders = ["maxTokens", "topK", "topP", "temperature", "thinking"];

      // ── Model ─────────────────────────────────────────────────────────────
      // const MODEL_URL = "gemma-4-E2B-it-web.task";
      const MODEL_URL =
        "https://huggingface.co/litert-community/gemma-4-E2B-it-litert-lm/resolve/main/gemma-4-E2B-it-web.task";

      const CACHE_NAME = "gemma-model-cache-v1";
      let llmInference = null;

      // ── Slider live-update ────────────────────────────────────────────────
      sliders.forEach((id) => {
        const el = document.getElementById(id);
        const val = document.getElementById(`${id}-val`);
        el.addEventListener("input", () => {
          val.textContent = el.value;
        });
      });

      function getParams() {
        return {
          maxTokens: parseInt(document.getElementById("maxTokens").value),
          topK: parseInt(document.getElementById("topK").value),
          topP: parseFloat(document.getElementById("topP").value),
          temperature: parseFloat(document.getElementById("temperature").value),
          thinking: parseInt(document.getElementById("thinking").value),
        };
      }

      // ── Status helpers ────────────────────────────────────────────────────
      function setStatus(msg, state = "loading") {
        statusText.textContent = msg;
        statusDot.className =
          "inline-block w-3 h-3 rounded-full flex-shrink-0 " +
          {
            loading: "bg-yellow-400 animate-pulse",
            ok: "bg-green-500",
            error: "bg-red-500",
          }[state];
      }

      // ── Cache check ───────────────────────────────────────────────────────
      async function checkCacheStatus() {
        try {
          const cache = await caches.open(CACHE_NAME);
          const keys = await cache.keys();
          const hit = keys.some((r) => r.url.includes(".task"));

          if (hit) {
            cacheDetail.innerHTML = `<span class="text-green-600 font-medium">✅ 模型已快取</span><br>
               <span class="text-slate-400 text-xs">下次載入將直接從本地讀取，無需重新下載。</span>`;
            cacheBadge.textContent = "已快取";
            cacheBadge.className =
              "ml-auto text-xs font-medium px-2 py-0.5 rounded-full bg-green-100 text-green-700";
          } else {
            cacheDetail.innerHTML = `<span class="text-amber-600 font-medium">⏳ 尚未快取</span><br>
               <span class="text-slate-400 text-xs">首次載入需從本地讀取模型檔案並寫入快取。</span>`;
            cacheBadge.textContent = "未快取";
            cacheBadge.className =
              "ml-auto text-xs font-medium px-2 py-0.5 rounded-full bg-amber-100 text-amber-700";
          }
          cacheBadge.classList.remove("hidden");
        } catch {
          cacheDetail.textContent = "無法存取 Cache API。";
        }
      }

      // ── Service Worker ────────────────────────────────────────────────────
      async function registerServiceWorker() {
        if (!("serviceWorker" in navigator)) {
          setStatus("你的瀏覽器不支援 Service Worker。", "error");
          return;
        }
        try {
          await navigator.serviceWorker.register("sw.js");
          setStatus("Service Worker 運作中，正在檢查快取...");
          await checkCacheStatus();
        } catch (e) {
          setStatus("Service Worker 註冊失敗，模型將不會被快取。", "error");
        }
      }

      // ── WebGPU check ──────────────────────────────────────────────────────
      async function checkWebGPU() {
        if (!navigator.gpu)
          throw new Error(
            "此瀏覽器不支援 WebGPU。請使用 Chrome 113+ 或 Edge 113+，並確保頁面透過 localhost 或 HTTPS 提供。",
          );
        const adapter = await navigator.gpu.requestAdapter();
        if (!adapter)
          throw new Error(
            "找不到 WebGPU 顯示卡介面卡。請確認顯示卡驅動程式已更新，並在 chrome://flags 啟用 WebGPU。",
          );
      }

      // ── Init model ────────────────────────────────────────────────────────
      async function initModel() {
        const p = getParams();
        try {
          await checkWebGPU();
          setStatus(
            "WebGPU 確認可用，正在載入 AI 模型（首次需下載，請耐心等候）...",
          );

          const genaiWasm = await FilesetResolver.forGenAiTasks(
            "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-genai/wasm",
          );

          const options = {
            baseOptions: { modelAssetPath: MODEL_URL },
            maxTokens: p.maxTokens,
            topK: p.topK,
            temperature: p.temperature,
            randomSeed: 101,
          };
          if (p.thinking > 0) options.thinkingBudget = p.thinking;

          llmInference = await LlmInference.createFromOptions(
            genaiWasm,
            options,
          );

          setStatus("✅ 模型已準備就緒，所有運算皆在本地進行！", "ok");
          promptInput.disabled = false;
          sendBtn.disabled = false;
          reloadBtn.disabled = false;
          await checkCacheStatus();
        } catch (error) {
          console.error("模型載入失敗:", error);
          setStatus(`❌ 模型載入失敗：${error.message}`, "error");
        }
      }

      // ── Reload on param change ────────────────────────────────────────────
      reloadBtn.addEventListener("click", async () => {
        promptInput.disabled = true;
        sendBtn.disabled = true;
        reloadBtn.disabled = true;
        if (llmInference) {
          try {
            llmInference.close();
          } catch {}
          llmInference = null;
        }
        setStatus("正在以新參數重新載入模型...");
        await initModel();
      });

      // ── Chat ──────────────────────────────────────────────────────────────
      async function handleSend() {
        const text = promptInput.value.trim();
        if (!text || !llmInference) return;

        appendMessage("user", text);
        promptInput.value = "";
        promptInput.disabled = true;
        sendBtn.disabled = true;
        tpsBar.classList.add("hidden");

        const aiMsgEl = appendMessage("ai", "");
        const thinkEl = document.createElement("div");
        thinkEl.className = "text-xs text-slate-400 italic mb-1 hidden";
        aiMsgEl.prepend(thinkEl);
        const textEl = document.createElement("span");
        aiMsgEl.appendChild(textEl);

        let tokenCount = 0;
        let thinkTokens = "";
        let inThink = false;
        const startTime = performance.now();

        try {
          const formattedPrompt = `<|turn>user\n${text}<turn|>\n<|turn>model\n`;
          await llmInference.generateResponse(
            formattedPrompt,
            (partial, done) => {
              // Detect <tool_call>…<tool_call> blocks
              const combined = (textEl.textContent || "") + partial;

              if (!inThink && partial.includes("<think>")) {
                inThink = true;
                thinkEl.classList.remove("hidden");
              }
              if (inThink) {
                thinkTokens += partial;
                const endIdx = thinkTokens.indexOf("</think>");
                if (endIdx !== -1) {
                  thinkEl.textContent =
                    "💭 " +
                    thinkTokens
                      .slice(thinkTokens.indexOf("<think>") + 7, endIdx)
                      .trim();
                  textEl.textContent = thinkTokens.slice(endIdx + 8);
                  inThink = false;
                } else {
                  thinkEl.textContent =
                    "💭 " + thinkTokens.replace("<think>", "").trim();
                }
              } else {
                textEl.textContent += partial;
              }

              tokenCount++;
              chatBox.scrollTop = chatBox.scrollHeight;

              if (done) {
                const elapsed = (performance.now() - startTime) / 1000;
                const tps = (tokenCount / elapsed).toFixed(1);
                tpsValue.textContent = tps;
                tpsBar.classList.remove("hidden");
              }
            },
          );
        } catch (error) {
          textEl.textContent = "發生錯誤：" + error.message;
        }

        promptInput.disabled = false;
        sendBtn.disabled = false;
        promptInput.focus();
      }

      function appendMessage(sender, text) {
        const wrap = document.createElement("div");
        wrap.className =
          sender === "user"
            ? "self-end max-w-[80%] bg-indigo-500 text-white rounded-2xl rounded-br-sm px-4 py-2 text-sm whitespace-pre-wrap"
            : "self-start max-w-[80%] bg-slate-100 text-slate-800 rounded-2xl rounded-bl-sm px-4 py-2 text-sm whitespace-pre-wrap";
        if (text) wrap.textContent = text;
        chatBox.appendChild(wrap);
        chatBox.scrollTop = chatBox.scrollHeight;
        return wrap;
      }

      // ── Keyboard: Enter sends, Shift+Enter newline ────────────────────────
      promptInput.addEventListener("keydown", (e) => {
        if (e.key === "Enter" && !e.shiftKey) {
          e.preventDefault();
          handleSend();
        }
      });
      sendBtn.addEventListener("click", handleSend);

      // ── Boot ──────────────────────────────────────────────────────────────
      await registerServiceWorker();
      await initModel();
    </script>
  </body>
</html>
